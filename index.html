<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Website</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
        }

        .box {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 48px;
            margin: 0;
        }

        p {
            color: #666;
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Hello World</h1>
        <p>我的第一个 Website 🚀</p>
    </div>

</body>
</html>
